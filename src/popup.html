<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>auto-translate</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="panel">
      <div class="brand">
        <img src="./icons/icon48.png" alt="auto-translate logo" />
        <h1>
          <a href="https://github.com/FeeiCN/X-Tweet-Translator" target="_blank" rel="noopener noreferrer">auto-translate</a>
        </h1>
      </div>

      <label class="item">
        <input id="enabled" type="checkbox" />
        <span>Enable extension</span>
      </label>

      <label class="item">
        <input id="autoTranslate" type="checkbox" />
        <span>Auto-translate supported content</span>
      </label>

      <label class="item item-column" for="targetLanguage">
        <span>Target language</span>
        <select id="targetLanguage">
          <option value="zh-CN">Chinese (Simplified)</option>
          <option value="en">English</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="es">Spanish</option>
        </select>
      </label>

      <p class="copyright">
        ©2026 <a href="https://feei.cn" target="_blank" rel="noopener noreferrer">FEEI</a> All Rights Reserved
      </p>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
